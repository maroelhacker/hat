<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Chat</title>

<style>
/* تصفير الهوامش بالكامل لجعل الشاشة كاملة فوراً */
html, body {
margin: 0 !important;
padding: 0 !important;
width: 100% !important;
height: 100% !important;
min-height: 100vh !important;
min-height: -webkit-fill-available !important;
overflow: hidden !important; 
background: #000000;
}

body {
font-family: Arial;
background: linear-gradient(to right, #000000, #3b0000, #7a0000);
display: flex;
justify-content: center;
align-items: center;
}

/* الحاوية ملء الشاشة */
.chat-container {
width: 100vw;
height: 100vh;
height: -webkit-fill-available;
display: flex;
flex-direction: column;
background: rgba(0,0,0,0.5);
backdrop-filter: blur(6px);
position: relative; 
overflow: hidden;
}

/* الهيدر */
.header {
width: 100%;
height: 70px;
background: #b30000;
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 15px;
box-sizing: border-box;
position: relative;
z-index: 10;
flex-direction: row-reverse; 
}

/* زر فتح القائمة الجانبية */
.menu-btn {
background: none;
border: none;
color: white;
font-size: 24px;
cursor: pointer;
padding: 5px 10px;
border-radius: 4px;
display: flex;
align-items: center;
justify-content: center;
transition: 0.3s;
font-weight: bold;
}

.menu-btn:hover {
background: rgba(255, 255, 255, 0.1);
}

/* حاوية الصورة داخل الهيدر */
.header-img-container {
flex: 1;
height: 100%;
overflow: hidden;
margin-left: 15px; 
}

.header-img-container img {
width: 100%;
height: 100%;
object-fit: cover;
}

/* القائمة الجانبية */
.sidebar {
position: absolute;
top: 0;
left: -280px; 
width: 280px;
height: 100%;
background: rgba(20, 0, 0, 0.85);
backdrop-filter: blur(10px);
border-right: 1px solid rgba(255, 255, 255, 0.1); 
z-index: 99; 
transition: 0.3s ease-in-out; 
display: flex;
flex-direction: column;
padding: 20px;
box-sizing: border-box;
color: white;
}

.sidebar.active {
left: 0;
}

.sidebar-header {
display: flex;
justify-content: space-between;
align-items: center;
border-bottom: 1px solid rgba(255, 255, 255, 0.1);
padding-bottom: 15px;
margin-bottom: 20px;
flex-direction: row-reverse; 
}

.sidebar-title {
font-size: 18px;
font-weight: bold;
color: #ff4d4d;
}

.close-btn {
background: none;
border: none;
color: #888;
font-size: 20px;
cursor: pointer;
transition: 0.3s;
}

.close-btn:hover {
color: white;
}

.sidebar-menu {
display: flex;
flex-direction: column;
gap: 10px;
}

.sidebar-item {
background: rgba(255, 255, 255, 0.05);
border: 1px solid rgba(255, 255, 255, 0.05);
padding: 12px;
border-radius: 8px;
cursor: pointer;
transition: 0.3s;
font-size: 15px;
text-align: right; 
}

.sidebar-item:hover {
background: rgba(179, 0, 0, 0.4);
border-color: rgba(255, 255, 255, 0.1);
}

.sidebar-overlay {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.5);
z-index: 98;
display: none;
}

.sidebar-overlay.active {
display: block;
}

/* الشات الأصلي */
.chat-box {
flex: 1;
overflow-y: auto;
padding: 15px;
}

/* الرسائل */
.msg {
display: flex;
align-items: flex-start;
margin: 12px 0;
position: relative;
}

.user {
justify-content: flex-end;
}

.bot {
justify-content: flex-start;
}

.msg-content {
display: flex;
flex-direction: column;
max-width: 75%;
}

.user .msg-content {
align-items: flex-end;
}

.bot .msg-content {
align-items: flex-start;
}

/* الفقاعات */
.bubble {
padding: 12px;
border-radius: 12px;
word-wrap: break-word;
font-size: 15px;
line-height: 1.4;
white-space: pre-line; 
}

/* المستخدم شفاف */
.user .bubble {
background: rgba(0,0,0,0.4);
color: white;
backdrop-filter: blur(5px);
border: 1px solid rgba(255,255,255,0.1);
margin-left: 10px;
}

/* البوت شفاف أحمر */
.bot .bubble {
background: rgba(179,0,0,0.5);
color: white;
backdrop-filter: blur(5px);
border: 1px solid rgba(255,255,255,0.1);
margin-right: 10px;
}

/* ستايل منطقة التذييل تحت رسائل البوت لتنظيم الوقت والزرار */
.bot-meta-area {
display: flex;
align-items: center;
gap: 15px;
margin-top: 4px;
padding: 0 4px;
}

.time-stamp {
font-size: 11px;
color: rgba(255, 255, 255, 0.4);
}

.user .time-stamp {
margin-top: 4px;
padding: 0 4px;
margin-right: 10px;
}

/* زر النسخ والمايك */
.bot-action-btn {
background: none;
border: none;
color: white;
font-size: 12px;
font-weight: bold;
cursor: pointer;
padding: 2px 5px;
transition: 0.2s;
}

.bot-action-btn.success {
color: #00ff00 !important;
}

/* إشعار التنبيه */
.toast-notification {
position: absolute;
top: -60px; 
left: 50%;
transform: translateX(-50%);
background: rgba(179, 0, 0, 0.9);
color: white;
padding: 10px 20px;
border-radius: 30px;
font-size: 14px;
font-weight: bold;
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
z-index: 100;
transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
backdrop-filter: blur(5px);
border: 1px solid rgba(255, 255, 255, 0.1);
}

.toast-notification.show {
top: 85px; 
}

/* الصور */
img.avatar {
width: 40px;
height: 40px;
border-radius: 50%;
object-fit: cover;
}

/* منطقة الإدخال المطورة */
.input-area {
display: flex;
align-items: center;
padding: 12px;
background: #1b1b1b;
border-top: 1px solid rgba(255,255,255,0.05);
gap: 8px;
position: relative;
}

input {
flex: 1;
padding: 12px;
border: none;
outline: none;
background: #222;
color: white;
border-radius: 6px;
font-size: 16px;
}

.send-btn-modern, .mic-btn {
width: 35px;
height: 35px;
background: #b30000;
border: none;
color: white;
cursor: pointer;
transition: 0.3s;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 14px; 
flex-shrink: 0;
}

.mic-btn {
background: rgba(255, 255, 255, 0.08);
border: 1px solid rgba(255, 255, 255, 0.1);
}

.send-btn-modern:hover {
background: #e60000;
transform: scale(1.05);
}

.mic-btn:hover {
background: rgba(255, 255, 255, 0.15);
}

.extra-menu {
position: absolute;
bottom: 60px;
left: 10px;
background: #222;
border: 1px solid #444;
border-radius: 8px;
padding: 10px;
display: none;
flex-direction: column;
gap: 5px;
z-index: 100;
min-width: 150px;
}

.extra-menu.active {
display: flex;
}

.extra-item {
color: white;
padding: 8px;
cursor: pointer;
border-radius: 4px;
text-align: right;
background: rgba(255,255,255,0.05);
margin-bottom: 5px;
}

.extra-item:hover {
background: #b30000;
}

.thinking{display:flex;gap:4px;align-items:center;padding:8px;}
.dot{width:8px;height:8px;background:#ff4d4d;border-radius:50%;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(.5);opacity:.4;}40%{transform:scale(1);opacity:1;}}

.chat-box::-webkit-scrollbar {
width: 4px;
}
.chat-box::-webkit-scrollbar-thumb {
background: rgba(179,0,0,0.4);
border-radius: 10px;
}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script></head>

<body>

<div class="chat-container">

    <div class="toast-notification" id="toastNotice">تم الدخول إلى محادثة جديدة</div>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">WormoGPT</span>
            <button class="close-btn" onclick="toggleSidebar()">✕</button>
        </div>
        <div style="text-align:center;padding:10px"><img id="userPic" src="bot.png" style="width:60px;height:60px;border-radius:50%"><br><b id="userName">زائر</b><br><small id="userEmail"></small><div id="g_id_onload" data-client_id="979760769178-ehg3brr1f5g7rdlp9qrf7ttjmem17lcm.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div><div class="g_id_signin"></div></div><div class="sidebar-menu">
            <div class="sidebar-item" onclick="startNewChat()">💬 محادثة جديدة (New Chat)</div>
            <div class="sidebar-item" onclick="alert('الإعدادات')">⚙️ الإعدادات</div>
            <div class="sidebar-item" onclick="alert('حسابي')">👤 ملف المستخدم</div>
            <div class="sidebar-item" onclick="alert('تسجيل الخروج')">🚪 تسجيل الخروج</div>
        </div>
    </div>

    <div class="header">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="header-img-container">
            <img src="title.jpg">
        </div>
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="input-area">
        <div class="extra-menu" id="extraMenu">
            <div class="extra-item" onclick="selectFromMenu('تريمكس')">تريمكس</div>
            <div class="extra-item" onclick="selectFromMenu('بايثون')">بايثون</div>
            <div class="extra-item" onclick="selectFromMenu('أمن سيبراني')">أمن سيبراني</div>
        </div>
        <button class="mic-btn" onclick="toggleExtraMenu()" title="إضافة">➕</button>
        <input type="text" id="msg" placeholder="اطرح سؤالك على WormoGPT" onkeypress="if(event.key==='Enter')send()">
        <button id="sendBtn" class="send-btn-modern" onclick="send()" title="إرسال">▲</button>
    </div>
</div>

<script>
let waiting = false;

function toggleExtraMenu() { document.getElementById("extraMenu").classList.toggle("active"); }

function selectFromMenu(text) {
    document.getElementById("msg").value = text;
    toggleExtraMenu();
    send();
}

function buildWelcomeMessage() {
    let chat = document.getElementById("chat");
    chat.innerHTML = `<div class="msg bot" id="welcomeMsg"><img src="bot.png" class="avatar"><div class="msg-content"><div class="bubble">مرحبا بك في WormoGPT 😈</div></div></div>`;
}

window.onload = buildWelcomeMessage;

function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

function startNewChat() {
    buildWelcomeMessage();
    document.getElementById("msg").value = "";
    toggleSidebar();
    let toast = document.getElementById("toastNotice");
    toast.classList.add("show");
    setTimeout(() => { toast.classList.remove("show"); }, 3000);
}

function getCurrentTime() {
    let now = new Date();
    let hours = now.getHours();
    let minutes = now.getMinutes();
    let ampm = hours >= 12 ? 'م' : 'ص';
    hours = hours % 12; hours = hours ? hours : 12;
    minutes = minutes < 10 ? '0'+minutes : minutes;
    return hours + ':' + minutes + ' ' + ampm;
}

// دالة النسخ مع التحويل للأخضر
function copyText(btn, text) {
    navigator.clipboard.writeText(text);
    btn.innerHTML = "✓ تم النسخ";
    btn.classList.add("success");
    setTimeout(() => {
        btn.innerHTML = "نسخ";
        btn.classList.remove("success");
    }, 2000);
}

// دالة القراءة الصوتية
function speak(text){
 if(!("speechSynthesis" in window)){alert("المتصفح لا يدعم القراءة الصوتية");return;}
 speechSynthesis.cancel();
 const u=new SpeechSynthesisUtterance(text);
 u.lang="ar-EG";
 speechSynthesis.speak(u);
}

function send(){
    if(waiting) return; 
    let input = document.getElementById("msg");
    let text = input.value.trim();
    if(text == "") return;

    let chat = document.getElementById("chat");
    let welcome = document.getElementById("welcomeMsg");
    if(welcome) welcome.remove();

    waiting = true;
    chat.innerHTML += `<div class="msg user"><div class="msg-content"><div class="bubble">${text}</div><div class="time-stamp">${getCurrentTime()}</div></div><img src="hacker.png" class="avatar"></div>`;
    
    input.value = "";
    chat.scrollTop = chat.scrollHeight;
    
    let reply = "أنا هنا، كيف يمكنني مساعدتك؟";
    let t = text.toLowerCase();
    
    if (t.includes("اهلا") || t.includes("مرحبا")) { reply = "أهلاً بك! أنا WormoGPT، كيف يمكنني مساعدتك اليوم؟"; }
    else if (t.includes("عامل ايه") || t.includes("كيف حالك")) { reply = "أنا بخير، شكراً لسؤالك! ماذا عنك؟"; }
    else if (t.includes("اسمك")) { reply = "أنا WormoGPT، مساعدك الذكي الخاص."; }
    else if (t.includes("بايثون")) { reply = "بايثون هي لغة برمجة قوية وسهلة التعلم، تستخدم في مجالات كثيرة مثل الذكاء الاصطناعي وتطوير الويب."; }
    else if (t.includes("تريمكس")) { reply = "تريمكس (Termux) هو محاكي طرفية (Terminal) قوي لنظام أندرويد يتيح لك تشغيل أدوات لينكس."; }
    else if (t.includes("امن سيبراني")) { reply = "الأمن السيبراني هو العلم الذي يختص بحماية الأنظمة والشبكات والبيانات من الهجمات الرقمية."; }

    chat.innerHTML += `<div class="msg bot" id="thinking"><img src="bot.png" class="avatar"><div class="msg-content"><div class="bubble thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div></div>`;
    
    setTimeout(()=>{
        document.getElementById("thinking").remove();
        chat.innerHTML += `
        <div class="msg bot">
            <img src="bot.png" class="avatar">
            <div class="msg-content">
                <div class="bubble">${reply}</div>
                <div class="bot-meta-area">
                    <button class="bot-action-btn" onclick="copyText(this, '${reply}')">نسخ</button>
                    <button class="bot-action-btn" onclick="speak('${reply}')">🔊</button>
                    <span class="time-stamp">${getCurrentTime()}</span>
                </div>
            </div>
        </div>`;
        chat.scrollTop = chat.scrollHeight;
        waiting = false;
    }, 1500); 
}

function parseJwt(t){return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));}
function handleCredentialResponse(r){const d=parseJwt(r.credential);localStorage.setItem('user',JSON.stringify(d));loadUser();}
function loadUser(){const s=localStorage.getItem('user');if(!s)return;const d=JSON.parse(s);userName.textContent=d.name;userEmail.textContent=d.email;userPic.src=d.picture;let w=document.getElementById('welcomeMsg');if(w){w.querySelector('.bubble').innerHTML='مرحبًا '+d.name+' 👋<br>أهلاً بك في WormoGPT 😈';}}
window.addEventListener('load',()=>setTimeout(loadUser,500));
</script>
</div>
</body>
</html>
