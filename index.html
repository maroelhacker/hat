<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WormoGPT</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
    /* الستايل الأساسي */
    body { margin: 0; background: #000; color: white; font-family: Arial; }
    .chat-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; background: rgba(0,0,0,0.5); }
    #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
    .sidebar { position: absolute; top: 0; left: -280px; width: 280px; height: 100%; background: #1a0000; z-index: 99; transition: 0.3s; padding: 20px; }
    .sidebar.active { left: 0; }
    .sidebar-item { padding: 12px; background: rgba(255,255,255,0.05); margin-bottom: 10px; cursor: pointer; border-radius: 8px; text-align: right; }
</style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="login-overlay">
    <h2>تسجيل الدخول لـ WormoGPT</h2>
    <div id="g_id_onload" data-client_id="979760769178-ehg3brr1f5g7rdlp9qrf7ttjmem17lcm.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
    <div class="g_id_signin"></div>
</div>

<div class="chat-container">
    <div class="sidebar" id="sidebar">
        <div style="text-align:center; padding-bottom:20px;">
            <img id="userPic" src="bot.png" style="width:60px; height:60px; border-radius:50%;">
            <h4 id="userName">زائر</h4>
            <small id="userEmail"></small>
        </div>
        <div class="sidebar-item" onclick="startNewChat()">💬 محادثة جديدة</div>
        <div class="sidebar-item" onclick="logout()">🚪 تسجيل الخروج</div>
    </div>

    <div style="padding:15px; background:#b30000;"><button onclick="document.getElementById('sidebar').classList.add('active')">☰</button></div>
    <div id="chat" style="flex:1; padding:20px;"></div>
</div>

<script>
    function parseJwt(t){return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));}
    
    function handleCredentialResponse(r){
        const d = parseJwt(r.credential);
        localStorage.setItem('user', JSON.stringify(d));
        location.reload();
    }

    function loadUser(){
        const s = localStorage.getItem('user');
        if(s){
            const d = JSON.parse(s);
            document.getElementById('userName').textContent = d.name;
            document.getElementById('userEmail').textContent = d.email;
            document.getElementById('userPic').src = d.picture;
            document.getElementById('login-overlay').style.display = 'none';
            return d.name;
        }
        return "زائر";
    }

    function speak(text){
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "ar-EG";
        window.speechSynthesis.speak(u);
    }

    function logout(){
        localStorage.removeItem('user');
        location.reload();
    }

    window.onload = () => {
        if(!localStorage.getItem('user')) {
            document.getElementById('login-overlay').style.display = 'flex';
        } else {
            let name = loadUser();
            document.getElementById("chat").innerHTML = `مرحباً ${name}، أهلاً بك في WormoGPT 😈`;
        }
    };
</script>
</body>
</html>
